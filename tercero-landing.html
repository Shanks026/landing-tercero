<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tercero — The all-in-one platform for social media agencies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #fff;
      color: #0a0a0a;
      font-family: 'Geist', system-ui, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .app-font { font-family: 'Geist', system-ui, sans-serif; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 9999px; }

    /* ── Reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .d1 { transition-delay: 0.08s; }
    .d2 { transition-delay: 0.16s; }
    .d3 { transition-delay: 0.24s; }
    .d4 { transition-delay: 0.32s; }

    /* ── Layout ── */
    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 40px; }
    @media(max-width:600px) { .wrap { padding: 0 20px; } }

    /* ── Navbar ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 22px 0;
      transition: background 0.4s, border-color 0.4s;
      border-bottom: 1px solid transparent;
    }
    nav.scrolled {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-color: #f0f0f0;
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; }
    .nav-right-group { display: flex; align-items: center; gap: 28px; }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-weight: 600; font-size: 17px; letter-spacing: -0.02em;
      color: #0a0a0a; text-decoration: none;
    }
    .logo-mark {
      width: 28px; height: 28px; background: #0a0a0a; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff; letter-spacing: -0.04em;
    }
    .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
    .nav-links a { color: #888; font-size: 14px; font-weight: 400; text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: #0a0a0a; }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .btn-ghost { background: none; border: none; color: #888; font-size: 14px; font-weight: 400; cursor: pointer; padding: 8px 14px; border-radius: 8px; transition: color 0.2s; font-family: inherit; }
    .btn-ghost:hover { color: #0a0a0a; }
    .btn-dark { background: #0a0a0a; color: #fff; border: none; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; font-family: inherit; letter-spacing: -0.01em; }
    .btn-dark:hover { opacity: 0.8; }

    /* ── Hero ── */
    .hero { padding: 100px 0 0; }
    .hero-center { text-align: center; max-width: 660px; margin: 0 auto; }
    .hero-label {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 500; color: #166534; letter-spacing: 0.02em;
      background: #dcfce7; border-radius: 100px; padding: 5px 12px 5px 8px;
      margin-bottom: 20px;
    }
    .hero-label .badge-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #16a34a; flex-shrink: 0;
    }
    h1 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: clamp(38px, 5vw, 68px);
      font-weight: 800;
      line-height: 1.06;
      letter-spacing: -0.03em;
      color: #0a0a0a;
      margin-bottom: 18px;
    }
    h1 em { font-style: normal; color: #aaa; }
    .hero-sub {
      font-size: 16px; color: #555; line-height: 1.7; max-width: 480px;
      font-weight: 400; margin: 0 auto 28px;
    }
    .hero-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      background: #0a0a0a; color: #fff; border: none; padding: 14px 26px;
      border-radius: 9px; font-size: 15px; font-weight: 500; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s; font-family: inherit;
      letter-spacing: -0.01em; display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-primary:hover { opacity: 0.82; transform: translateY(-1px); }
    .btn-secondary {
      background: none; color: #666; border: 1px solid #e5e5e5; padding: 14px 26px;
      border-radius: 9px; font-size: 15px; font-weight: 400; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; font-family: inherit;
    }
    .btn-secondary:hover { border-color: #bbb; color: #0a0a0a; }
    .hero-footnote { font-size: 12px; color: #ccc; margin-top: 14px; }

    /* ── Hamburger ── */
    .hamburger { display:none; background:none; border:none; cursor:pointer; padding:6px; color:#0a0a0a; }
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:300; backdrop-filter:blur(2px); }
    .drawer { position:fixed; top:0; right:0; bottom:0; width:260px; background:#fff; z-index:400; padding:24px 20px; box-shadow:-8px 0 40px rgba(0,0,0,0.08); display:flex; flex-direction:column; }
    .drawer-close { align-self:flex-end; background:none; border:none; cursor:pointer; padding:4px; color:#888; margin-bottom:24px; }
    .drawer-links { list-style:none; display:flex; flex-direction:column; gap:4px; }
    .drawer-links a { display:block; font-size:16px; font-weight:500; color:#0a0a0a; text-decoration:none; padding:10px 8px; border-radius:8px; transition:background 0.15s; }
    .drawer-links a:hover { background:#f5f5f5; }
    .drawer-divider { height:1px; background:#f0f0f0; margin:16px 0; }

    /* ── Hero Visual ── */
    .hero-visual {
      position: relative;
      margin-top: 36px;
      border: 1px solid #f0f0f0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 40px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.02);
    }
    .hero-visual::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent 0%, #ffffff 100%);
      pointer-events: none;
      z-index: 2;
    }
    .hv-bar {
      background: #fafafa;
      border-bottom: 1px solid #f0f0f0;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 6px;
    }
    .hv-dot { width: 10px; height: 10px; border-radius: 50%; }
    .hv-url {
      flex: 1; margin: 0 12px; background: #f0f0f0; border-radius: 5px;
      padding: 5px 10px; display: flex; align-items: center;
    }
    .hv-url span { font-size: 11px; color: #aaa; font-family: monospace; }
    .hv-body { display: flex; min-height: 420px; }
    .hv-sidebar {
      width: 220px; border-right: 1px solid #f5f5f5; padding: 20px 0;
      flex-shrink: 0;
    }
    .hv-nav-label { font-size: 10px; font-weight: 600; color: #ccc; text-transform: uppercase; letter-spacing: 0.08em; padding: 0 18px; margin-bottom: 6px; margin-top: 16px; }
    .hv-nav-label:first-child { margin-top: 0; }
    .hv-nav-item {
      display: flex; align-items: center; gap: 9px; padding: 8px 18px;
      font-size: 13px; color: #aaa; cursor: pointer; transition: background 0.15s;
      border-radius: 0;
    }
    .hv-nav-item.active { background: #f7f7f7; color: #0a0a0a; font-weight: 500; }
    .hv-nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    .hv-main { flex: 1; padding: 24px; overflow: hidden; }
    .hv-page-title { font-size: 16px; font-weight: 600; color: #0a0a0a; letter-spacing: -0.02em; margin-bottom: 4px; }
    .hv-page-sub { font-size: 12px; color: #aaa; margin-bottom: 20px; }
    .hv-cards { display: flex; flex-direction: column; gap: 8px; }
    .hv-card {
      border: 1px solid #f0f0f0; border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; background: #fff;
      transition: border-color 0.2s;
    }
    .hv-card:hover { border-color: #e0e0e0; }
    .plat { width: 24px; height: 24px; border-radius: 6px; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .p-ig { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color: #fff; }
    .p-li { background: #0077b5; color: #fff; }
    .p-x  { background: #000; color: #fff; }
    .hv-card-info { flex: 1; min-width: 0; }
    .hv-card-client { font-size: 13px; font-weight: 500; color: #0a0a0a; }
    .hv-card-preview { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .pill {
      font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 9999px;
      white-space: nowrap; flex-shrink: 0;
    }
    .pill-pending { background: #fff8ed; color: #e08000; border: 1px solid #ffe4b5; }
    .pill-approved { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .pill-draft { background: #f5f5f5; color: #aaa; border: 1px solid #e5e5e5; }
    .pill-revision { background: #fff5f5; color: #dc2626; border: 1px solid #fecaca; }
    .hv-card-ver { font-size: 10px; color: #ccc; margin-top: 2px; }

    /* ── Divider ── */
    .divider { height: 1px; background: #f5f5f5; }

    /* ── Section base ── */
    .section { padding: 60px 0; }
    .section-sm { padding: 40px 0; }

    /* ── Eyebrow ── */
    .eyebrow {
      font-size: 12px; font-weight: 500; color: #777; letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 16px; display: block;
    }

    /* ── Section titles ── */
    h2 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: clamp(28px, 3.5vw, 46px);
      font-weight: 800; line-height: 1.1; letter-spacing: -0.03em;
      color: #0a0a0a; margin-bottom: 14px;
    }
    h2 em { font-style: normal; color: #999; }
    .lead { font-size: 16px; color: #555; line-height: 1.7; font-weight: 400; max-width: 500px; }

    /* ── Problem ── */
    .problem-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 0; border: 1px solid #f0f0f0; border-radius: 14px; overflow: hidden;
      margin-top: 56px;
    }
    .prob-item {
      padding: 36px 32px; border-right: 1px solid #f0f0f0;
      transition: background 0.2s;
    }
    .prob-item:last-child { border-right: none; }
    .prob-item:hover { background: #fafafa; }
    .prob-num {
      font-family: 'Instrument Serif', Georgia, serif; font-size: 42px; color: #bbb;
      line-height: 1; margin-bottom: 14px; font-weight: 400; font-style: normal;
    }
    .prob-title { font-size: 15px; font-weight: 500; color: #0a0a0a; margin-bottom: 8px; letter-spacing: -0.01em; }
    .prob-desc { font-size: 14px; color: #666; line-height: 1.6; font-weight: 400; }

    /* ── Approval section ── */
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 96px; align-items: start; }
    .split.rev { direction: rtl; }
    .split.rev > * { direction: ltr; }

    .check-list { list-style: none; margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    .check-list li { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: #555; line-height: 1.55; font-weight: 400; }
    .check-list li svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 3px; stroke: #0a0a0a; fill: none; }

    /* ── Approval flow card ── */
    .flow-card {
      border: 1px solid #f0f0f0; border-radius: 16px; overflow: hidden;
      box-shadow: 0 1px 20px rgba(0,0,0,0.04);
    }
    .flow-header { padding: 20px 24px; border-bottom: 1px solid #f5f5f5; }
    .flow-title { font-size: 13px; font-weight: 500; color: #0a0a0a; letter-spacing: -0.01em; }
    .flow-sub { font-size: 12px; color: #bbb; margin-top: 2px; }
    .flow-body { padding: 20px 24px; }
    .flow-step {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px 0; border-bottom: 1px solid #f8f8f8;
    }
    .flow-step:last-child { border-bottom: none; padding-bottom: 0; }
    .flow-n {
      width: 22px; height: 22px; border-radius: 50%; background: #f5f5f5;
      color: #bbb; font-size: 11px; font-weight: 600; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
    }
    .flow-n.done { background: #f0fdf4; color: #16a34a; }
    .flow-n.active { background: #0a0a0a; color: #fff; }
    .flow-step-text { flex: 1; }
    .flow-step-label { font-size: 13px; font-weight: 500; color: #0a0a0a; }
    .flow-step-desc { font-size: 12px; color: #bbb; margin-top: 2px; line-height: 1.5; }
    .flow-link {
      display: flex; align-items: center; gap: 8px; background: #fafafa;
      border: 1px solid #f0f0f0; border-radius: 8px; padding: 10px 14px; margin-top: 16px;
    }
    .flow-link-url { font-size: 11px; color: #aaa; font-family: monospace; flex: 1; }
    .flow-copy { font-size: 11px; font-weight: 500; color: #0a0a0a; cursor: pointer; white-space: nowrap; }

    /* ── Features grid ── */
    .feat-grid {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 0; border-top: 1px solid #f0f0f0; margin-top: 56px;
    }
    .feat-item {
      padding: 32px 28px; border-right: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0; transition: background 0.2s;
    }
    .feat-item:nth-child(4n) { border-right: none; }
    .feat-item:hover { background: #fafafa; }
    .feat-icon {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: center; margin-bottom: 14px;
    }
    .feat-icon svg { width: 15px; height: 15px; stroke: #666; fill: none; stroke-width: 1.7; }
    .feat-name { font-size: 14px; font-weight: 500; color: #0a0a0a; margin-bottom: 6px; letter-spacing: -0.01em; }
    .feat-desc { font-size: 13px; color: #666; line-height: 1.55; font-weight: 400; }

    /* ── Finance visual ── */
    .fin-card {
      border: 1px solid #f0f0f0; border-radius: 16px; overflow: hidden;
      box-shadow: 0 1px 20px rgba(0,0,0,0.04);
    }
    .fin-header { padding: 20px 24px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; justify-content: space-between; }
    .fin-title { font-size: 13px; font-weight: 500; color: #0a0a0a; }
    .fin-body { padding: 20px 24px; }
    .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .kpi { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 10px; padding: 16px; }
    .kpi-label { font-size: 11px; color: #bbb; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .kpi-val { font-family: 'Instrument Serif', serif; font-size: 26px; color: #0a0a0a; line-height: 1; font-weight: 400; }
    .kpi-trend { font-size: 11px; color: #16a34a; margin-top: 4px; font-weight: 500; }
    .kpi-trend.warn { color: #e08000; }
    .inv-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 0;
      border-bottom: 1px solid #f8f8f8;
    }
    .inv-item:last-child { border-bottom: none; }
    .inv-num { font-size: 11px; color: #ccc; font-family: monospace; width: 90px; flex-shrink: 0; }
    .inv-client { flex: 1; font-size: 13px; color: #0a0a0a; font-weight: 400; }
    .inv-amt { font-size: 13px; font-weight: 500; color: #0a0a0a; font-family: 'Instrument Serif', serif; }

    /* ── Pricing ── */
    .price-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 16px; margin-top: 56px;
    }
    .price-card {
      border: 1px solid #f0f0f0; border-radius: 16px; padding: 32px;
      transition: border-color 0.3s, transform 0.3s; position: relative;
    }
    .price-card:hover { border-color: #ddd; transform: translateY(-3px); }
    .price-card.featured { border-color: #0a0a0a; background: #0a0a0a; }
    .price-card.featured:hover { border-color: #000; }
    .feat-label {
      position: absolute; top: -11px; left: 50%; transform: translateX(-50%);
      background: #0a0a0a; color: #fff; font-size: 10px; font-weight: 600;
      padding: 3px 12px; border-radius: 9999px; white-space: nowrap; letter-spacing: 0.04em;
    }
    .plan-tier { font-size: 12px; font-weight: 500; color: #bbb; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .plan-tier.light { color: rgba(255,255,255,0.4); }
    .plan-price {
      font-family: 'Instrument Serif', serif; font-size: 42px; color: #0a0a0a;
      line-height: 1; letter-spacing: -0.02em; margin-bottom: 4px; font-weight: 400;
    }
    .plan-price.light { color: #fff; }
    .plan-per { font-size: 13px; color: #777; margin-bottom: 6px; font-weight: 400; }
    .plan-per.light { color: rgba(255,255,255,0.5); }
    .plan-clients { font-size: 12px; color: #777; margin-bottom: 24px; font-weight: 400; }
    .plan-clients.light { color: rgba(255,255,255,0.4); }
    .pdiv { height: 1px; background: #f0f0f0; margin-bottom: 22px; }
    .pdiv.light { background: rgba(255,255,255,0.1); }
    .plan-feats { list-style: none; display: flex; flex-direction: column; gap: 9px; margin-bottom: 28px; }
    .plan-feats li { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #555; font-weight: 400; }
    .plan-feats li.light { color: rgba(255,255,255,0.65); }
    .plan-feats li svg { width: 13px; height: 13px; stroke: #bbb; fill: none; stroke-width: 2.5; flex-shrink: 0; margin-top: 2px; }
    .plan-feats li.light svg { stroke: rgba(255,255,255,0.5); }
    .plan-btn {
      width: 100%; padding: 12px; border-radius: 9px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.2s; letter-spacing: -0.01em;
    }
    .plan-btn-outline { background: none; color: #0a0a0a; border: 1px solid #e5e5e5; }
    .plan-btn-outline:hover { border-color: #bbb; }
    .plan-btn-white { background: #fff; color: #0a0a0a; border: none; }
    .plan-btn-white:hover { opacity: 0.9; }

    /* ── Platforms ── */
    .plat-section { padding: 64px 0; border-top: 1px solid #f5f5f5; }
    .plat-row { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .plat-tag {
      display: flex; align-items: center; gap: 6px; font-size: 13px; color: #bbb;
      padding: 8px 16px; border: 1px solid #f0f0f0; border-radius: 9999px;
      transition: border-color 0.2s, color 0.2s; font-weight: 400;
    }
    .plat-tag:hover { border-color: #ddd; color: #666; }
    .plat-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── Final CTA ── */
    .final { padding: 80px 0; text-align: center; background: #fafafa; }
    .final h2 { max-width: 640px; margin: 0 auto 16px; }
    .final p { color: #666; font-size: 16px; margin-bottom: 36px; font-weight: 400; }
    .final-note { font-size: 12px; color: #ccc; margin-top: 14px; }

    /* ── Footer ── */
    footer { padding: 56px 0 36px; border-top: 1px solid #f5f5f5; }
    .foot-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 48px; }
    .foot-brand-desc { font-size: 14px; color: #888; line-height: 1.65; margin-top: 12px; max-width: 240px; font-weight: 400; }
    .foot-col-title { font-size: 11px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
    .foot-links { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .foot-links a { font-size: 14px; color: #888; text-decoration: none; transition: color 0.2s; font-weight: 400; }
    .foot-links a:hover { color: #0a0a0a; }
    .foot-bottom { border-top: 1px solid #f5f5f5; padding-top: 24px; display: flex; align-items: center; justify-content: space-between; }
    .foot-legal { font-size: 12px; color: #ddd; }

    /* ── Responsive ── */
    @media(max-width:1024px) {
      .feat-grid { grid-template-columns: repeat(2,1fr); }
